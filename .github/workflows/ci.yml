name: CI

on:
  push:
    branches: [ master, development ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read

jobs:
  test:
    name: Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    # Ryuk (the testcontainers reaper) is unnecessary on ephemeral runners and
    # its image pull from Docker Hub is a flaky failure point — disable it.
    env:
      TESTCONTAINERS_RYUK_DISABLED: "true"
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.10", "3.11", "3.12", "3.13", "3.14" ]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install -e . -r requirements-dev.txt
      - name: Run tests (PostgreSQL + ClickHouse via testcontainers)
        run: python -m pytest --cov=rick_db --cov-report=term-missing

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install lint tools
        run: pip install flake8 black
      - name: flake8 (real errors)
        run: flake8 --select=E9,F63,F7,F82,F811 rick_db
      - name: black --check (advisory)
        # Advisory only: emit a clean notice on drift instead of a failing step.
        run: |
          black --check --diff rick_db \
            || echo "::notice title=black::formatting drift detected (advisory; run 'black rick_db')"

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          pip install build
          python -m build

  security:
    name: Vulnerability + SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e . pip-audit bandit
      - name: pip-audit (dependency CVEs)
        # editable self-install is skipped; dependencies are still audited and
        # the step fails on any known CVE.
        run: pip-audit --skip-editable --desc
      - name: bandit (SAST)
        run: bandit -r rick_db -ll -x tests

  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [ test, lint, build, security ]
    if: always()
    steps:
      - name: Verify all jobs passed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "One or more required jobs failed."
          exit 1
      - name: Success
        run: echo "All CI jobs passed."
